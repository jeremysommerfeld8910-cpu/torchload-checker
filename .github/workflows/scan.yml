name: CWE-502 Security Scan

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  torchload-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run torchload-checker
        run: python3 torchload_checker.py . --exclude-tests --summary

      - name: Generate SARIF results
        if: always()
        run: python3 torchload_checker.py . --exclude-tests --sarif > results.sarif || true

      - name: Upload to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: torchload-checker
